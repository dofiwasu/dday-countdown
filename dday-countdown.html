<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>D-Day Widget</title>
</head>
<body style="margin:0;">

<div id="container" style="display:inline-block; padding:20px;">
    <div id="dday" style="font-size:24px; font-weight:bold;"></div>
</div>

<script>
// ===== D-day 계산 =====
const targetDate = new Date("2026-12-31"); // 날짜 수정
const today = new Date();
today.setHours(0,0,0,0);

const diffTime = targetDate - today;
const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

let result = "";

if (diffDays > 0) {
    result = "D-" + diffDays;
} else if (diffDays === 0) {
    result = "D-DAY";
} else {
    result = "D+" + (Math.abs(diffDays) + 1);
}

document.getElementById("dday").innerText = result;


// ===== 높이 자동 맞춤 =====
function sendHeight() {
    const height = document.body.scrollHeight;
    window.parent.postMessage({ frameHeight: height }, "*");
}

window.onload = sendHeight;
window.onresize = sendHeight;
setInterval(sendHeight, 500); // 지속적으로 갱신
</script>

</body>
</html>
