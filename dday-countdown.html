<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>D-Day Widget</title>
</head>

<body style="margin:0; padding:0;">

<div id="container" style="text-align:center; padding:20px; transition:0.3s;">

  <div id="dday" style="font-size:24px; font-weight:bold; margin-bottom:10px;"></div>

  <div>
    <button onclick="resizeBox(120)">작게</button>
    <button onclick="resizeBox(200)">보통</button>
    <button onclick="resizeBox(300)">크게</button>
  </div>

</div>

<script>
const targetDate = new Date("2026-12-31"); // 날짜 수정

const today = new Date();
today.setHours(0,0,0,0);

const diffTime = targetDate - today;
const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

let result = "";

if (diffDays > 0) {
    result = "D-" + diffDays;
} else if (diffDays === 0) {
    result = "D-DAY";
} else {
    result = "D+" + (Math.abs(diffDays) + 1);
}

document.getElementById("dday").innerText = result;

function resizeBox(height) {
    document.getElementById("container").style.height = height + "px";
}
</script>

</body>
</html>
