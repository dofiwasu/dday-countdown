<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>D-Day</title>
</head>
<body>

<div id="dday" style="font-size:20px; font-weight:bold;"></div>

<script>
const targetDate = new Date("2026-12-31"); // ⭐ 원하는 날짜로 수정

const today = new Date();
today.setHours(0,0,0,0);

const diffTime = targetDate - today;
const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

let result = "";

if (diffDays > 0) {
    result = "D-" + diffDays;
} else if (diffDays === 0) {
    result = "D-DAY";
} else {
    result = "D+" + (Math.abs(diffDays) + 1); // ⭐ D+는 +1 적용
}

document.getElementById("dday").innerText = result;
</script>

</body>
</html>
