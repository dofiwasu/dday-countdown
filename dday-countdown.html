<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
}

.container {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
}

#dday {
    width: 100%;
    text-align: center;
    font-weight: bold;
    font-size: clamp(20px, 5vw, 60px); /* ⭐ 크기 자동 반응 */
}
</style>
</head>

<body>
<div class="container">
    <div id="dday"></div>
</div>

<script>
const targetDate = new Date("2024-09-17"); // 날짜 수정

const today = new Date();
today.setHours(0,0,0,0);

const diffTime = targetDate - today;
const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

let result = "";

if (diffDays > 0) {
    result = "D-" + diffDays;
} else if (diffDays === 0) {
    result = "D-DAY";
} else {
    result = "D+" + (Math.abs(diffDays) + 1);
}

document.getElementById("dday").innerText = result;
</script>

</body>
</html>
